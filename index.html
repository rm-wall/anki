<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">暗记程序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay"></div>
    <div class="container">
        <div class="language-switcher">
            <label for="language-select" data-i18n="languageLabel">语言:</label>
            <select id="language-select">
                <option value="zh-CN">中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <h1 data-i18n="mainHeading">暗记程序</h1>

        <div id="setup">
            <h2 data-i18n="listHeading">输入单词列表</h2>
            <p data-i18n="instructions">每行一个词条，格式为：<b>问题, 答案1, 答案2...</b>，例如：</p>
            <p><code>桜,さくら,sakura</code></p>
            <div id="file-drop-zone">
                <p data-i18n="dropZoneLabel">将文件拖放到此处，或点击选择文件</p>
                <input type="file" id="file-input" accept=".txt,.csv" style="display: none;">
            </div>
            <textarea id="word-list-input" rows="10">桜,さくら,sakura
車,くるま,kuruma
猫,ねこ,neko
犬,いぬ,inu
食べる,たべる,taberu
飲む,のむ,nomu
日本語,にほんご,nihongo,Japanese,Japanisch</textarea>
            <div id="textarea-stats" class="textarea-stats">
                <span id="total-words-stat"></span>
                <span id="new-words-stat"></span>
                <span id="learned-words-stat"></span>
                <span id="suspended-words-stat"></span>
                <span id="starred-words-stat"></span>
            </div>
            <fieldset class="review-options-fieldset">
                <legend data-i18n="reviewOptionsLegend">复习选项</legend>
                <div class="order-option">
                    <input type="checkbox" id="random-order-checkbox" checked>
                    <label for="random-order-checkbox" data-i18n="randomOrderLabel">随机顺序</label>
                </div>
                <span class="option-separator"></span>
                <div class="review-scope-option">
                    <input type="radio" id="scope-all" name="review-scope" value="all" checked>
                    <label for="scope-all" data-i18n="scopeAllLabel">所有单词</label>
                </div>
                <div class="review-scope-option">
                    <input type="radio" id="scope-textarea" name="review-scope" value="textarea">
                    <label for="scope-textarea" data-i18n="scopeTextareaLabel">文本框内单词</label>
                </div>
                <div class="review-scope-option">
                    <input type="radio" id="scope-starred" name="review-scope" value="starred">
                    <label for="scope-starred" data-i18n="scopeStarredLabel">星标单词</label>
                </div>
            </fieldset>
            <div class="button-group">
                <button id="start-button" data-i18n="startButton">开始学习</button>
                <button id="show-errors-button" data-i18n="showAllCardsButton">查看所有卡片</button>
                <button id="settings-button" data-i18n="settingsButton">设置</button>
            </div>
        </div>

        <div id="card" style="display: none;">
            <button id="star-button" class="star-button">☆</button>
            <div id="question" class="question"></div>
            <input type="text" id="answer-input" data-i18n-placeholder="answerPlaceholder" placeholder="输入答案后按回车" autocomplete="off">
            <div id="feedback"></div>
            <div class="auto-advance-option">
                <input type="checkbox" id="auto-advance-checkbox">
                <label for="auto-advance-checkbox" data-i18n="autoAdvanceLabel">自动跳到下一题</label>
            </div>
            <div class="button-group">
                <button id="redo-button" style="display: none;" data-i18n="redoButton">重新练习</button>
                <button id="continue-button" style="display: none;" data-i18n="continueButton">继续</button>
                <button id="suspend-button" style="display: none;" data-i18n="suspendButton">暂停</button>
                <button id="terminate-button" data-i18n="terminateButton">终止测验</button>
            </div>
        </div>

        <div id="summary" style="display: none;">
            <h2 data-i18n="summaryHeading">完成！</h2>
            <p><span data-i18n="correctLabel">正确</span>: <span id="correct-count">0</span></p>
            <p><span data-i18n="incorrectLabel">错误</span>: <span id="incorrect-count">0</span></p>
            
            <div id="incorrect-words-container" style="display: none;">
                <h3 data-i18n="incorrectWordsHeading">答错的单词 (方便复习)</h3>
                <div id="incorrect-words-list"></div>
            </div>

            <button id="restart-button" data-i18n="restartButton">返回主菜单</button>
        </div>
    </div>

    <div id="error-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n="allCardsModalHeading">所有卡片状态</h2>
            <div id="modal-incorrect-list"></div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n="settingsModalHeading">算法参数设置</h2>
            <div class="settings-form">
                <div class="settings-form-group">
                    <label for="required-streak-input" data-i18n="requiredStreakLabel">掌握所需连对次数</label>
                    <div class="input-group">
                        <input type="number" id="required-streak-input" value="2" min="1">
                    </div>
                </div>
                <div class="settings-form-group">
                    <label for="penalty-input" data-i18n="penaltyLabel">答错扣除连对次数</label>
                    <div class="input-group">
                        <input type="number" id="penalty-input" value="2" min="0">
                    </div>
                </div>
                <div class="settings-form-group">
                    <label for="setting-initial-interval-value" data-i18n="initialIntervalLabel">初次答对后间隔</label>
                    <div class="input-group">
                        <input type="number" id="setting-initial-interval-value" min="1">
                        <select id="setting-initial-interval-unit">
                            <option value="minutes" data-i18n="minutes">分钟</option>
                            <option value="hours" data-i18n="hours">小时</option>
                            <option value="days" data-i18n="days">天</option>
                        </select>
                    </div>
                </div>
                <div class="settings-form-group">
                    <label for="setting-second-interval-value" data-i18n="secondIntervalLabel">再次答对后间隔</label>
                    <div class="input-group">
                        <input type="number" id="setting-second-interval-value" min="1">
                        <select id="setting-second-interval-unit">
                            <option value="minutes" data-i18n="minutes">分钟</option>
                            <option value="hours" data-i18n="hours">小时</option>
                            <option value="days" data-i18n="days">天</option>
                        </select>
                    </div>
                </div>
                <div class="settings-form-group">
                    <label for="setting-lapse-interval-value" data-i18n="lapseIntervalLabel">答错后间隔</label>
                    <div class="input-group">
                        <input type="number" id="setting-lapse-interval-value" min="1">
                        <select id="setting-lapse-interval-unit">
                            <option value="minutes" data-i18n="minutes">分钟</option>
                            <option value="hours" data-i18n="hours">小时</option>
                            <option value="days" data-i18n="days">天</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-button-group">
                <button id="save-settings-button" data-i18n="saveButton">保存</button>
                <button id="reset-settings-button" data-i18n="resetButton">恢复默认</button>
            </div>
            <div class="settings-danger-zone">
                <h3 data-i18n="dangerZoneHeading">危险区域</h3>
                <button id="clear-cache-button" data-i18n="clearCacheButton">清空所有本地数据</button>
            </div>
        </div>
    </div>

    <script src="lib/sql.js/sql-wasm.js"></script>
    <script src="script.js"></script>
    <footer id="last-updated"></footer>
</body>
</html>
